services:
  db:
    image: postgres:17-alpine
    container_name: wykonczymy
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
  db-test:
    image: postgres:17-alpine
    container_name: wykonczymy-test
    ports:
      - '5435:5432'
    environment:
      POSTGRES_DB: wykonczymy-test
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d wykonczymy-test']
      interval: 2s
      timeout: 3s
      retries: 15
volumes:
  pgdata:
  pgdata-test:
