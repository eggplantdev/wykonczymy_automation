# ============================================================================
# Daily Neon Postgres → FTP Backup (validated)
# ============================================================================
# What it does:
#   1. Dumps the database with a disposable Postgres container
#   2. Validates the dump for real (not just file size):
#        - size floor      : catches an empty/aborted dump
#        - row floor        : transactions >= MIN_TX  (catches wrong/empty DB)
#        - freshness        : newest date within FRESH_DAYS (catches frozen DB)
#        - no-shrink        : key-table counts must not drop vs the previous
#                             backup pulled from FTP (catches data loss/downgrade)
#   3. Uploads to the remote server via FTPS
#   4. Removes backups older than RETENTION_DAYS from the remote dir
#
# History: the old version validated ONLY file size, so it stayed green for
# weeks while dumping the WRONG, frozen database. The row/freshness/no-shrink
# checks exist specifically to make that failure mode loud. Logic proven first
# in scripts/db-backup.sh.
#
# Secrets required (repo → Settings → Secrets):
#   POSTGRES_URL  : Neon connection string for the DB that is source-of-truth
#   FTP_HOST / FTP_USER / FTP_PASS
#
# Manual runs (workflow_dispatch) default to the test/ dir so they never touch
# real backups; the nightly schedule writes to the prod dir.
# ============================================================================

name: Backup Neon DB

on:
  schedule:
    # hourly 04:00–22:00 UTC = 06:00–00:00 Warsaw (CEST). Cron is fixed UTC with
    # no DST, so in winter (CET) this shifts to 05:00–23:00 Warsaw — adjust if it matters.
    - cron: '0 4-22 * * *'
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Remote dir to upload to (leave default for safe test runs)'
        required: false
        default: '/db_backups/test/'

jobs:
  backup-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Scheduled runs have no inputs -> fall back to the real backup dir.
      # Manual runs default to test/ (input default above).
      REMOTE_DIR: ${{ github.event.inputs.target_dir || '/db_backups/' }}
      RETENTION_DAYS: '30'
      SIZE_FLOOR: '1024' # bytes (gzipped)
      MIN_TX: '1000' # transactions floor (real prod ~2131)
      FRESH_DAYS: '3' # newest date in dump must be within this
      KEY_TABLES: 'transactions investments cash_registers users'

    steps:
      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # ---- 1. dump -------------------------------------------------------
      - name: Create backup with Docker
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          FILENAME="wykonczymy-backup-${TIMESTAMP}.sql.gz"
          docker run --rm postgres:17-alpine \
            pg_dump "$POSTGRES_URL" --no-owner --no-privileges --clean --if-exists \
            | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"
          echo "✅ Backup created: $FILENAME"

      # ---- 2. validate: size, row floor, freshness -----------------------
      - name: Validate backup
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          count_rows() { # <file> <table>
            gzip -dc "$1" | awk -v tb="COPY public.$2 " '
              index($0, tb)==1 {f=1; next}
              f && $0=="\\." {f=0}
              f {n++}
              END {print n+0}'
          }

          SIZE=$(stat -c%s "$BACKUP_FILE")
          echo "📦 size: $SIZE bytes"
          if [ "$SIZE" -lt "$SIZE_FLOOR" ]; then
            echo "❌ dump too small ($SIZE < $SIZE_FLOOR) — empty/aborted"; exit 1
          fi

          TX=$(count_rows "$BACKUP_FILE" transactions)
          echo "🔢 transactions rows: $TX"
          if [ "$TX" -lt "$MIN_TX" ]; then
            echo "❌ transactions=$TX below floor $MIN_TX — wrong/empty DB?"; exit 1
          fi

          # Freshness off the last ACTUAL insert (created_at), queried live.
          # NOT a date-grep of the dump: the business `date` column can be
          # future-dated and would spoof a date-grep into always passing.
          MAX_CREATED=$(docker run --rm postgres:17-alpine \
            psql "$POSTGRES_URL" -tAc "SELECT max(created_at)::date FROM transactions" | tr -d '[:space:]')
          echo "📅 latest created_at: ${MAX_CREATED:-none}"
          if [ -z "$MAX_CREATED" ]; then echo "❌ could not read max(created_at)"; exit 1; fi
          CUTOFF=$(date -d "-${FRESH_DAYS} days" +%Y-%m-%d)
          if [ "$MAX_CREATED" \< "$CUTOFF" ]; then
            echo "❌ latest created_at $MAX_CREATED older than $CUTOFF (${FRESH_DAYS}d) — DB frozen?"; exit 1
          fi
          echo "✅ size / rows / freshness OK"

      # ---- 3. no-shrink vs the previous backup on FTP --------------------
      - name: Compare against previous backup
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          LFTP_OPTS="set ftp:ssl-auth TLS; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; set xfer:clobber on;"

          # Newest existing backup in REMOTE_DIR (filenames are timestamped, so
          # lexical sort == chronological). Empty if the dir is new/empty.
          # lftp just lists; the shell does the sort|tail (lftp's own pipe/
          # redirect parsing is unreliable). cd to a missing dir -> empty list.
          PREV_NAME=$(lftp -c "
            $LFTP_OPTS
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            cd '$REMOTE_DIR';
            cls -1 *.sql.gz
          " 2>/dev/null | sort | tail -1 || true)

          if [ -z "$PREV_NAME" ]; then
            echo "ℹ️ no previous backup in $REMOTE_DIR — establishing baseline, skipping no-shrink"
            exit 0
          fi
          echo "🔁 previous backup: $PREV_NAME"

          lftp -c "
            $LFTP_OPTS
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            cd '$REMOTE_DIR';
            get '$PREV_NAME' -o prev.sql.gz
          "

          count_rows() { # <file> <table>
            gzip -dc "$1" | awk -v tb="COPY public.$2 " '
              index($0, tb)==1 {f=1; next}
              f && $0=="\\." {f=0}
              f {n++}
              END {print n+0}'
          }

          DRIFT=0
          for t in $KEY_TABLES; do
            NEW_C=$(count_rows "$BACKUP_FILE" "$t")
            OLD_C=$(count_rows prev.sql.gz "$t")
            printf '   %-18s prev=%-6s new=%-6s Δ=%+d\n' "$t" "$OLD_C" "$NEW_C" "$((NEW_C - OLD_C))"
            if [ "$NEW_C" -lt "$OLD_C" ]; then
              echo "   ↳ ❌ $t shrank ($OLD_C → $NEW_C)"; DRIFT=1
            fi
          done
          rm -f prev.sql.gz
          if [ "$DRIFT" -ne 0 ]; then
            echo "❌ a key table shrank vs previous backup — refusing to trust this dump"; exit 1
          fi
          echo "✅ no-shrink OK"

      # ---- 4. upload + retention ----------------------------------------
      - name: Upload via FTPS and prune old backups
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          LFTP_OPTS="set ftp:ssl-auth TLS; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no;"

          # --- upload ---
          lftp -c "
            $LFTP_OPTS
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -p -f '$REMOTE_DIR';
            put -O '$REMOTE_DIR' '$BACKUP_FILE';
            bye
          "
          echo "✅ Uploaded $BACKUP_FILE to $REMOTE_DIR"

          # --- prune backups older than RETENTION_DAYS ---
          CUTOFF=$(date -d "${RETENTION_DAYS} days ago" +%Y%m%d)
          FILE_LIST=$(lftp -c "
            $LFTP_OPTS
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            cd '$REMOTE_DIR';
            cls -1 *.sql.gz
          ")
          DELETE_CMDS=""
          while read -r FILE; do
            [ -z "$FILE" ] && continue
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
            if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ]; then
              echo "🗑️ Will delete: $FILE"
              DELETE_CMDS="${DELETE_CMDS}rm '${REMOTE_DIR}${FILE}';"
            fi
          done <<< "$FILE_LIST"
          if [ -n "$DELETE_CMDS" ]; then
            lftp -c "
              $LFTP_OPTS
              open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
              ${DELETE_CMDS}
            "
          fi
          echo "✅ Cleanup complete — kept last ${RETENTION_DAYS} days"
